          # Agent level configuration
test_agent:
  log_dir: ~/.local/share/jiopc/agent/
  

  execution_order:
  - A
  - B
  - C

analysis: 
  prompt_file : ./prompts/analyse_log.txt

  
               #PART A
web_apps:
  - name: Chess.com
    url: https://www.chess.com
    timeout: 15
    load_threshold_ms: 2000
    bot_detection_expected : False

    checks:
      - type: role_name
        role: heading
        value: "Play Chess Online on the #1"


  - name : JioAiCloud
    url: https://www.jioaicloud.com
    timeout : 15
    load_threshold_ms: 2000
    bot_detection_expected : False


    checks:
      - type : role_name
        role : heading
        value : "Experience JioAICloud"


  - name : Khan Academy
    url: https://www.khanacademy.org
    timeout : 15
    load_threshold_ms: 2000 
    bot_detection_expected : True


    checks:
      - type : role_name
        role : heading
        value: "Khan Academy boosts Scores!"

  - name: Duolingo
    url: https://www.duolingo.com
    timeout: 15
    load_threshold_ms: 2000
    bot_detection_expected: False

    checks:
      - type: role_name
        role: heading
        value : "The free, fun, and effective"
      
      - type: role
        value : banner

  - name : Easy Shiksha
    url: https://www.easyshiksha.com
    timeout : 15
    load_threshold_ms: 2000
    bot_detection_expected: False

    checks:
      - type: role_name
        role: link
        value: "Easy Shiksha: Online Courses"

  - name : Scraping Course
    url : https://www.scrapingcourse.com/cloudflare-challenge
    timeout: 15
    load_threshold_ms : 2000
    bot_detection_expected : True
    checks:
      - type: role_name
        role: heading
        value: "Cloudflare Challenge"

  - name : Jio Saavn
    url: https://jiosaavn.com
    timeout: 15
    load_threshold_ms : 2000
    bot_detection_expected: False
    checks:
      - type : selector
        value : "nav"


        #PART B
native_apps:

  - app_name : mpv Media Player
    process_name: mpvmediaplayer
    launch_timeout_s: 10
    desktop_file : /usr/share/applications/mpv.desktop

  - app_name : audacious
    process_name: audacious
    launch_timeout_s : 10
    desktop_file : /usr/share/applications/audacious.desktop
    
  - app_name : FeatherNotes
    process_name: feathernotes
    launch_timeout_s : 10
    desktop_file : /usr/share/applications/feathernotes.desktop
  
  - app_name : LibreOffice Calc
    process_name: LibreOffice
    launch_timeout_s : 10
    desktop_file : /usr/share/applications/libreoffice-calc.desktop

  - app_name : LibreOffice Math
    process_name: math
    launch_timeout_s : 10
    desktop_file : /usr/share/applications/libreoffice-math.desktop

  - app_name : LibreOffice Impress
    process_name: libreimpress
    launch_timeout_s : 10
    desktop_file : /usr/share/applications/libreoffice-impress.desktop

  - app_name : LibreOffice Writer 
    process_name: libreoffice
    launch_timeout_s : 10
    desktop_file : /usr/share/applications/libreoffice-writer.desktop

  - app_name : Calculator
    process_name: calculator
    launch_timeout_s : 10
    desktop_file : /usr/share/applications/org.gnome.Calculator.desktop

  - app_name : Thunar File Manager
    process_name: file_manager
    launch_timeout_s : 10
    desktop_file : /usr/share/applications/thunar.desktop
  
  - app_name : Text Editor  
    process_name: text editor
    launch_timeout_s : 10
    desktop_file : /usr/share/applications/audacious.desktop
  

