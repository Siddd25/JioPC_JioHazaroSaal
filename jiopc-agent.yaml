
test_agent:
  log_dir: ~/.local/share/jiopc/agent/

  execution_order:
  - B
  - A
  - C
  

web_apps:
  - name: Chess.com
    desktop_file :  
    url: https://www.chess.com
    timeout: 15
    load_threshold_ms: 2000

    checks:
      - type: role_name
        role: heading
        value: "Play Chess Online on the #1"


  - name : JioAiCloud
    url: https://www.jioaicloud.com
    timeout : 15
    load_threshold_ms: 2000


    checks:
      - type : role_name
        role : heading
        value : "Experience JioAICloud"


  - name : ChatGPT
    url: https://www.chatgpt.com
    timeout : 15
    load_threshold_ms: 2000 


    checks:
      - type : role_name
        role : textbox
        value: "Chat with ChatGPT"



